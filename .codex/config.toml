[mcp_servers.shrimp-task-manager]  
command = "node"  
args = ["/Users/hero4earth/Developer/Workspace/mcp-shrimp-task-manager/dist/index.js"]  
  
[mcp_servers.shrimp-task-manager.env]  
DATA_DIR = "DATA_DIR=/Users/hero4earth/Developer/Workspace/coupang-ad-manager/shrimp_data"  
TEMPLATES_USE = "en"  
ENABLE_GUI = "true"

[mcp_servers.playwright]
type = "stdio"
command = "npx"
