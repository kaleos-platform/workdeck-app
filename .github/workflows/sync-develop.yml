name: Sync develop from main

on:
  push:
    branches: [main]

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Merge main into develop
        run: |
          git checkout develop
          git merge origin/main --no-edit
          git push origin develop
